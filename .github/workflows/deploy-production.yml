name: 🚀 Production Deployment Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all components'
        required: false
        default: false
        type: boolean
      skip_tests:
        description: 'Skip tests (emergency deployment)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  DEPLOYMENT_TIMEOUT: '600'

jobs:
  # Pre-deployment checks and validation
  pre-deployment:
    name: 🔍 Pre-deployment Validation
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      mobile_changed: ${{ steps.changes.outputs.mobile }}
      deploy_needed: ${{ steps.changes.outputs.deploy_needed }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Detect Changes
        id: changes
        run: |
          # Check for changes in different components
          if git diff --name-only HEAD~1 HEAD | grep -E '^CRM-BACKEND/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "🔄 Backend changes detected"
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD~1 HEAD | grep -E '^CRM-FRONTEND/'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "🔄 Frontend changes detected"
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD~1 HEAD | grep -E '^CRM-MOBILE/'; then
            echo "mobile=true" >> $GITHUB_OUTPUT
            echo "🔄 Mobile changes detected"
          else
            echo "mobile=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if any deployment-relevant files changed
          if git diff --name-only HEAD~1 HEAD | grep -E '\.(js|ts|tsx|json|yml|yaml|sh)$'; then
            echo "deploy_needed=true" >> $GITHUB_OUTPUT
            echo "🚀 Deployment needed"
          else
            echo "deploy_needed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No deployment needed"
          fi

      - name: 📋 Deployment Summary
        run: |
          echo "## 📋 Deployment Plan" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ steps.changes.outputs.backend == 'true' && '🔄 Deploy' || '⏭️ Skip' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.changes.outputs.frontend == 'true' && '🔄 Deploy' || '⏭️ Skip' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | ${{ steps.changes.outputs.mobile == 'true' && '🔄 Deploy' || '⏭️ Skip' }} |" >> $GITHUB_STEP_SUMMARY

  # Build and test components
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    needs: pre-deployment
    if: needs.pre-deployment.outputs.deploy_needed == 'true'
    
    strategy:
      matrix:
        component: [backend, frontend, mobile]
        include:
          - component: backend
            path: CRM-BACKEND
            build_cmd: npm run build
            test_cmd: echo "Backend tests would run here"
          - component: frontend
            path: CRM-FRONTEND
            build_cmd: npm run build
            test_cmd: echo "Frontend tests would run here"
          - component: mobile
            path: CRM-MOBILE
            build_cmd: npm run build
            test_cmd: echo "Mobile tests would run here"
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ${{ matrix.path }}
        run: |
          echo "🔧 Installing dependencies for ${{ matrix.component }}..."

          # Clear npm cache to prevent corruption issues
          echo "🧹 Clearing npm cache..."
          npm cache clean --force

          # Remove node_modules and package-lock if they exist
          rm -rf node_modules package-lock.json

          # Install dependencies with retry logic
          echo "📦 Installing dependencies..."
          if [ "${{ matrix.component }}" = "mobile" ]; then
            # Mobile app needs legacy peer deps
            npm install --legacy-peer-deps --no-audit --no-fund --maxsockets 1
          else
            # Backend and frontend
            npm install --no-audit --no-fund --maxsockets 1
          fi

      - name: 🏗️ Build Component
        working-directory: ${{ matrix.path }}
        run: |
          echo "🏗️ Building ${{ matrix.component }}..."

          # Build with retry logic
          for i in 1 2 3; do
            echo "🔄 Build attempt $i/3..."
            if ${{ matrix.build_cmd }}; then
              echo "✅ Build successful on attempt $i"
              break
            else
              echo "❌ Build failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "💥 All build attempts failed"
                exit 1
              fi
              echo "⏳ Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: 🧪 Run Tests
        if: github.event.inputs.skip_tests != 'true'
        working-directory: ${{ matrix.path }}
        run: |
          echo "🧪 Testing ${{ matrix.component }}..."
          ${{ matrix.test_cmd }}

  # Deploy to production server
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment, build-and-test]
    if: needs.pre-deployment.outputs.deploy_needed == 'true'
    environment: production
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: 📋 Create Deployment Info
        run: |
          # Clean commit message by removing problematic characters
          CLEAN_MESSAGE=$(printf '%s' "${{ github.event.head_commit.message }}" | tr -d '\000-\037\177' | sed 's/"/\\"/g' | head -1)

          # Use jq to create valid JSON safely
          jq -n \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commit_sha "${{ github.sha }}" \
            --arg commit_message "$CLEAN_MESSAGE" \
            --arg author "${{ github.event.head_commit.author.name }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg workflow_run_id "${{ github.run_id }}" \
            --argjson backend "${{ needs.pre-deployment.outputs.backend_changed }}" \
            --argjson frontend "${{ needs.pre-deployment.outputs.frontend_changed }}" \
            --argjson mobile "${{ needs.pre-deployment.outputs.mobile_changed }}" \
            --argjson force_rebuild "${{ github.event.inputs.force_rebuild || false }}" \
            '{
              timestamp: $timestamp,
              commit_sha: $commit_sha,
              commit_message: $commit_message,
              author: $author,
              branch: $branch,
              workflow_run_id: $workflow_run_id,
              components: {
                backend: $backend,
                frontend: $frontend,
                mobile: $mobile
              },
              force_rebuild: $force_rebuild
            }' > deployment-info.json

      - name: 📤 Transfer Files to Server
        run: |
          echo "📤 Transferring deployment files to production server..."
          scp -r -P ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -o StrictHostKeyChecking=no \
            deployment-info.json \
            scripts/deploy-production.sh \
            scripts/health-check.sh \
            scripts/rollback.sh \
            ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:/tmp/

      - name: 🚀 Execute Deployment
        run: |
          echo "🚀 Starting production deployment..."
          ssh -p ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            set -e
            
            # Move to deployment directory
            cd /opt/crm-app/current
            
            # Make scripts executable
            chmod +x /tmp/deploy-production.sh
            chmod +x /tmp/health-check.sh
            chmod +x /tmp/rollback.sh
            
            # Execute deployment
            /tmp/deploy-production.sh /tmp/deployment-info.json
          EOF

      - name: 🏥 Health Check
        run: |
          echo "🏥 Running post-deployment health checks..."
          ssh -p ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            /tmp/health-check.sh
          EOF

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.event.head_commit.author.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Production Site](https://crm.allcheckservices.com)" >> $GITHUB_STEP_SUMMARY
          echo "- [API Health](https://crm.allcheckservices.com/health)" >> $GITHUB_STEP_SUMMARY
          echo "- [Mobile App](https://crm.allcheckservices.com/mobile/)" >> $GITHUB_STEP_SUMMARY

  # Rollback on failure
  rollback:
    name: 🔄 Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && needs.deploy-production.result == 'failure'
    environment: production
    
    steps:
      - name: 🔐 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: 🔄 Execute Rollback
        run: |
          echo "🔄 Executing rollback due to deployment failure..."
          ssh -p ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            /tmp/rollback.sh
          EOF

      - name: 📢 Notify Rollback
        run: |
          echo "## ⚠️ Deployment Failed - Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "The deployment failed and has been automatically rolled back." >> $GITHUB_STEP_SUMMARY
          echo "Please check the logs and fix the issues before attempting another deployment." >> $GITHUB_STEP_SUMMARY
