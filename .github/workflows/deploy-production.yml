name: 🚀 Production Deployment Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild all components (backend, frontend, mobile)"
        required: false
        default: false
        type: boolean
      deploy_database:
        description: "Deploy database migrations and schema"
        required: false
        default: false
        type: boolean
      skip_tests:
        description: "Skip tests (emergency deployment)"
        required: false
        default: false
        type: boolean
      restore_database:
        description: "Restore database from full dump (acs_db_final_version.sql)"
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: "22"
  DEPLOYMENT_TIMEOUT: "600"

# 2026-05-01 pre-AWS hardening: explicit minimum permissions. Default
# would grant write-all to GITHUB_TOKEN which the deploy doesn't need.
# Each job below can override if it actually writes (none currently do).
permissions:
  contents: read

jobs:
  # Pre-deployment checks and validation
  pre-deployment:
    name: 🔍 Pre-deployment Validation
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      migrations_changed: ${{ steps.changes.outputs.migrations }}
      deploy_needed: ${{ steps.changes.outputs.deploy_needed }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetch enough history to compute `before..sha` for the push. Pushes
          # with many commits need more than the default shallow checkout.
          fetch-depth: 0

      - name: 🔍 Detect Changes
        id: changes
        run: |
          # Check if manual triggers are requested
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild }}"
          DEPLOY_DATABASE="${{ github.event.inputs.deploy_database }}"
          RESTORE_DATABASE="${{ github.event.inputs.restore_database }}"

          echo "DEBUG: Raw force_rebuild: $FORCE_REBUILD"
          echo "DEBUG: Raw deploy_database: $DEPLOY_DATABASE"
          echo "DEBUG: Raw restore_database: $RESTORE_DATABASE"

          # Normalize boolean strings
          [ "$FORCE_REBUILD" = "true" ] && FORCE_REBUILD_FLAG=true || FORCE_REBUILD_FLAG=false
          [ "$DEPLOY_DATABASE" = "true" ] && DEPLOY_DATABASE_FLAG=true || DEPLOY_DATABASE_FLAG=false
          [ "$RESTORE_DATABASE" = "true" ] && RESTORE_DATABASE_FLAG=true || RESTORE_DATABASE_FLAG=false

          if [ "$FORCE_REBUILD_FLAG" = "true" ] || [ "$RESTORE_DATABASE_FLAG" = "true" ]; then
            echo "🔄 Manual trigger or Restore requested - forcing deployment"
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            if [ "$RESTORE_DATABASE_FLAG" = "true" ]; then
              echo "migrations=true" >> $GITHUB_OUTPUT
            else
              echo "migrations=$DEPLOY_DATABASE" >> $GITHUB_OUTPUT
            fi
            echo "deploy_needed=true" >> $GITHUB_OUTPUT
          else
            # Diff over the entire pushed range. HEAD~1 was wrong: it only saw
            # the topmost commit, so multi-commit pushes (or retries after a
            # previously-failed deploy where an earlier commit had real
            # changes) got skipped builds and left stale dist/ on the remote.
            BEFORE_SHA="${{ github.event.before }}"
            CURRENT_SHA="${{ github.sha }}"
            # github.event.before is 000...000 on the first push to a branch
            # or for workflow_dispatch; fall back to a single-commit diff.
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              DIFF_RANGE="HEAD~1 HEAD"
              echo "DEBUG: using fallback diff range: $DIFF_RANGE"
            else
              DIFF_RANGE="$BEFORE_SHA $CURRENT_SHA"
              echo "DEBUG: using push diff range: $DIFF_RANGE"
            fi

            CHANGED_FILES=$(git diff --name-only $DIFF_RANGE)
            echo "DEBUG: changed files:"
            echo "$CHANGED_FILES"

            # Check for changes in different components
            if echo "$CHANGED_FILES" | grep -qE '^CRM-BACKEND/'; then
              echo "backend=true" >> $GITHUB_OUTPUT
              echo "🔄 Backend changes detected"
            else
              echo "backend=false" >> $GITHUB_OUTPUT
            fi

            if echo "$CHANGED_FILES" | grep -qE '^CRM-FRONTEND/'; then
              echo "frontend=true" >> $GITHUB_OUTPUT
              echo "🔄 Frontend changes detected"
            else
              echo "frontend=false" >> $GITHUB_OUTPUT
            fi

            # Check for database migration changes
            if echo "$CHANGED_FILES" | grep -qE '^CRM-BACKEND/migrations/.*\.sql$'; then
              echo "migrations=true" >> $GITHUB_OUTPUT
              echo "🗄️ Database migrations detected"
            else
              echo "migrations=false" >> $GITHUB_OUTPUT
            fi

            # Check if any deployment-relevant files changed
            if echo "$CHANGED_FILES" | grep -qE '\.(js|ts|tsx|json|yml|yaml|sh|sql|html|css|png|jpg|jpeg|svg|ico|webp)$'; then
              echo "deploy_needed=true" >> $GITHUB_OUTPUT
              echo "🚀 Deployment needed"
            else
              echo "deploy_needed=false" >> $GITHUB_OUTPUT
              echo "ℹ️ No deployment needed"
            fi
          fi

      - name: 📋 Deployment Summary
        run: |
          echo "## 📋 Deployment Plan" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ steps.changes.outputs.backend == 'true' && '🔄 Deploy' || '⏭️ Skip' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.changes.outputs.frontend == 'true' && '🔄 Deploy' || '⏭️ Skip' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | ${{ (steps.changes.outputs.migrations == 'true' || github.event.inputs.restore_database == 'true') && '🗄️ Migrate/Restore' || '⏭️ Skip' }} |" >> $GITHUB_STEP_SUMMARY

  # Lint code quality checks
  lint:
    name: 🔍 Code Quality (ESLint)
    runs-on: ubuntu-latest
    needs: pre-deployment
    if: needs.pre-deployment.outputs.deploy_needed == 'true'

    strategy:
      matrix:
        component: [backend, frontend]
        include:
          - component: backend
            path: CRM-BACKEND
          - component: frontend
            path: CRM-FRONTEND

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.path }}/package.json

      - name: 📦 Install Dependencies
        working-directory: ${{ matrix.path }}
        run: |
          npm ci --no-audit --no-fund

      - name: 🔍 Run ESLint
        working-directory: ${{ matrix.path }}
        run: |
          echo "🔍 Running ESLint for ${{ matrix.component }}..."
          npm run lint

      - name: 🛡️ Security Audit
        working-directory: ${{ matrix.path }}
        run: |
          echo "🛡️ Running npm audit for ${{ matrix.component }}..."
          npm audit --audit-level=critical --omit=dev

  # Build and test components
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    needs: [pre-deployment, lint]
    if: needs.pre-deployment.outputs.deploy_needed == 'true'

    strategy:
      matrix:
        component: [backend, frontend]
        include:
          - component: backend
            path: CRM-BACKEND
            build_cmd: npm run build
            test_cmd: npm run test
          - component: frontend
            path: CRM-FRONTEND
            build_cmd: npm run build
            test_cmd: echo "Frontend tests pending setup"

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.path }}/package.json

      - name: 📦 Install Dependencies
        working-directory: ${{ matrix.path }}
        timeout-minutes: 10
        run: |
          echo "🔧 Installing dependencies for ${{ matrix.component }}..."

          # Clear npm cache to prevent corruption issues
          echo "🧹 Clearing npm cache..."
          npm cache clean --force

          # Remove node_modules and package-lock if they exist
          rm -rf node_modules package-lock.json

          # Install dependencies with retry logic and timeout
          echo "📦 Installing dependencies..."

          install_with_retry() {
            local max_attempts=3
            local attempt=1

            while [ $attempt -le $max_attempts ]; do
              echo "🔄 Attempt $attempt of $max_attempts..."

              if [ "${{ matrix.component }}" = "mobile" ]; then
                # Mobile app needs legacy peer deps
                if timeout 300 npm install --legacy-peer-deps --no-audit --no-fund --maxsockets 1; then
                  echo "✅ Dependencies installed successfully"
                  return 0
                fi
              else
                # Backend and frontend
                if timeout 300 npm install --no-audit --no-fund --maxsockets 1; then
                  echo "✅ Dependencies installed successfully"
                  return 0
                fi
              fi

              echo "❌ Attempt $attempt failed"
              if [ $attempt -lt $max_attempts ]; then
                echo "🧹 Cleaning up for retry..."
                npm cache clean --force
                rm -rf node_modules package-lock.json
                sleep 5
              fi

              attempt=$((attempt + 1))
            done

            echo "❌ All attempts failed"
            return 1
          }

          install_with_retry

      - name: 🏗️ Build Component
        working-directory: ${{ matrix.path }}
        timeout-minutes: 15
        run: |
          echo "🏗️ Building ${{ matrix.component }}..."

          # Build with retry logic
          for i in 1 2 3; do
            echo "🔄 Build attempt $i/3..."
            if ${{ matrix.build_cmd }}; then
              echo "✅ Build successful on attempt $i"
              break
            else
              echo "❌ Build failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "💥 All build attempts failed"
                exit 1
              fi
              echo "⏳ Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

      - name: 🧪 Run Tests
        if: github.event.inputs.skip_tests != 'true'
        working-directory: ${{ matrix.path }}
        run: |
          echo "🧪 Testing ${{ matrix.component }}..."
          ${{ matrix.test_cmd }}

  # Deploy to production server
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment, lint, build-and-test]
    if: needs.pre-deployment.outputs.deploy_needed == 'true'
    environment: production

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # 2026-05-01 pre-AWS hardening: ssh-agent keeps the private key in
      # agent memory only — never written to disk on the runner. Replaces
      # the prior `echo > ~/.ssh/id_rsa` pattern.
      - name: 🔐 Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: 🔐 Pin host key (TOFU on first deploy, reject on mismatch after)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: 📋 Create Deployment Info
        env:
          # Pipe the raw commit message through an env var so shell / YAML
          # doesn't interpret ${} / () / backticks inside the message body.
          # This replaces the prior direct ${{ }} interpolation which broke
          # on any commit message containing shell-syntactic characters.
          RAW_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          # Keep only the first line, strip control chars. No escaping of `"`
          # needed — jq's --arg handles that safely.
          CLEAN_MESSAGE=$(printf '%s' "$RAW_COMMIT_MESSAGE" | head -1 | tr -d '\000-\037\177')

          # Use jq to create valid JSON safely
          jq -n \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commit_sha "${{ github.sha }}" \
            --arg commit_message "$CLEAN_MESSAGE" \
            --arg author "$COMMIT_AUTHOR" \
            --arg branch "${{ github.ref_name }}" \
            --arg workflow_run_id "${{ github.run_id }}" \
            --argjson backend "${{ needs.pre-deployment.outputs.backend_changed }}" \
            --argjson frontend "${{ needs.pre-deployment.outputs.frontend_changed }}" \
            --argjson migrations_changed "${{ needs.pre-deployment.outputs.migrations_changed }}" \
            --argjson force_rebuild "${{ github.event.inputs.force_rebuild || false }}" \
            --argjson deploy_database "${{ github.event.inputs.deploy_database || false }}" \
            --argjson restore_database "${{ github.event.inputs.restore_database || false }}" \
            '{
              timestamp: $timestamp,
              commit_sha: $commit_sha,
              commit_message: $commit_message,
              author: $author,
              branch: $branch,
              workflow_run_id: $workflow_run_id,
              components: {
                backend: $backend,
                frontend: $frontend
              },
              migrations_changed: $migrations_changed,
              force_rebuild: $force_rebuild,
              deploy_database: $deploy_database,
              restore_database: $restore_database
            }' > deployment-info.json

      - name: 📤 Transfer Files to Server
        run: |
          echo "📤 Transferring deployment files to production server..."
          FILES=(
            deployment-info.json
            scripts/deploy-production.sh
            scripts/health-check.sh
            start-production.sh
            ecosystem.config.js
          )

          if [ "${{ github.event.inputs.restore_database }}" = "true" ]; then
            if [ ! -f "acs_db_final_version.sql" ]; then
              echo "❌ restore_database=true but acs_db_final_version.sql is missing in repository root"
              exit 1
            fi
            FILES+=(acs_db_final_version.sql)
          else
            echo "ℹ️ restore_database is not enabled; skipping DB dump file transfer"
          fi

          scp -r -P ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -o StrictHostKeyChecking=accept-new \
            "${FILES[@]}" \
            ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:/tmp/

      - name: 🚀 Execute Deployment
        run: |
          echo "🚀 Starting production deployment..."
          ssh -p ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -o StrictHostKeyChecking=accept-new ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            set -e
            
            # Move to deployment directory
            cd /opt/crm-app/current
            
            # Copy startup files to project root
            cp /tmp/start-production.sh ./start-production.sh
            cp /tmp/ecosystem.config.js ./ecosystem.config.js
            
            # Make scripts executable
            chmod +x /tmp/deploy-production.sh
            chmod +x /tmp/health-check.sh
            chmod +x ./start-production.sh

            # Execute deployment
            /tmp/deploy-production.sh /tmp/deployment-info.json
          EOF

      - name: 🏥 Health Check
        run: |
          echo "🏥 Running post-deployment health checks..."
          ssh -p ${{ secrets.PRODUCTION_SSH_PORT || '2232' }} -o StrictHostKeyChecking=accept-new ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            /tmp/health-check.sh
          EOF

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.event.head_commit.author.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🗄️ Database Migrations" >> $GITHUB_STEP_SUMMARY
          echo "- **Migrations Detected:** ${{ needs.pre-deployment.outputs.migrations_changed == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Check deployment logs for migration execution details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Production Site](https://example.com)" >> $GITHUB_STEP_SUMMARY
          echo "- [API Health](https://example.com/health)" >> $GITHUB_STEP_SUMMARY
