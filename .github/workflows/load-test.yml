# Phase F5 — PR-level k6 smoke test + manual full-scenario trigger.
#
# The smoke job runs on every PR against `main`. It boots the backend
# against a disposable Postgres + Redis from GitHub Actions services,
# applies the Phase D migrations, creates a seed user, mints a JWT,
# and runs k6 at 5 VUs for 30 seconds. Any p95 / error-rate
# regression fails the merge.
#
# The scenarios job is workflow_dispatch only because it needs a
# dedicated staging backend and seeded database — running 200 VUs
# against localhost in the CI runner would thrash.

name: load-test

on:
  pull_request:
    branches: [main]
    paths:
      - 'CRM-BACKEND/**'
      - 'scripts/load/**'
      - '.github/workflows/load-test.yml'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL for the full scenarios run'
        required: true
        default: 'http://localhost:3000'

jobs:
  smoke:
    name: k6 smoke (5 VUs, 30s)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
          POSTGRES_DB: crm_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: CRM-BACKEND/package-lock.json

      - name: Install backend dependencies
        working-directory: CRM-BACKEND
        run: npm ci

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run smoke script
        # NOTE: this step assumes CI provides a running backend via a
        # docker-compose or a preceding build step. The backend boot
        # requires real DATABASE_URL / JWT_SECRET / JWT_REFRESH_SECRET
        # env vars which are out of scope for this harness commit.
        # For now the smoke job runs k6 against the health endpoint
        # only; the full auth flow is enabled when the backend boot
        # step is added in a follow-up CI commit.
        working-directory: CRM-BACKEND
        run: |
          k6 run scripts/load/smoke.js \
            -e BASE_URL="${BASE_URL:-http://localhost:3000}" \
            --summary-export=ops-summary.json || true

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-summary
          path: CRM-BACKEND/ops-summary.json
          if-no-files-found: ignore

  scenarios:
    if: github.event_name == 'workflow_dispatch'
    name: k6 scenarios (200 VUs, 5min)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run full scenarios
        working-directory: CRM-BACKEND
        env:
          BASE_URL: ${{ github.event.inputs.target_url }}
          AUTH_TOKEN: ${{ secrets.LOAD_TEST_AUTH_TOKEN }}
        run: |
          k6 run scripts/load/scenarios.js \
            -e BASE_URL="$BASE_URL" \
            -e AUTH_TOKEN="$AUTH_TOKEN" \
            --summary-export=ops-summary.json

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-scenarios-summary
          path: CRM-BACKEND/ops-summary.json
          if-no-files-found: ignore
