input {
  beats {
    port => 5044
  }
  
  # File input for CRM logs
  file {
    path => "/var/log/crm/*.log"
    start_position => "beginning"
    tags => ["crm"]
  }
  
  # TCP input for application logs
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [tags] and "crm" in [tags] {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}" }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
    }
  }
  
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "crm-logs-%{+YYYY.MM.dd}"
  }
  
  # Debug output
  stdout {
    codec => rubydebug
  }
}
