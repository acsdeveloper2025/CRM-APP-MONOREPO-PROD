# =============================================================================
# Staging edge nginx config — single file, declarative, version-controlled.
# Memory rule #6: NEVER mutate this at deploy time.
#
# Responsibilities:
#   * TLS termination on :443 (Let's Encrypt cert mounted from /etc/letsencrypt)
#   * HTTP :80 → HTTPS redirect (and serves /.well-known/acme-challenge for renewal)
#   * Static FE: catch-all routes return /index.html for client-side routing
#   * /api/*       reverse-proxy → api:3000
#   * /socket.io/* reverse-proxy → api:3000 (with WebSocket upgrade)
#   * /uploads/*   reverse-proxy → api:3000 (Node serves files; storage abstraction
#                  stays in charge, future S3 flip is transparent)
#   * /_edge_health static 200 for container healthcheck (no SPA involvement)
#
# Hostname: crm.allcheckservices.com (locked decision 2026-05-20).
# =============================================================================

# HTTP server: ACME challenge passthrough + redirect everything else to HTTPS.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name crm.allcheckservices.com;

    # certbot --webroot renewal challenge. Compose mounts an empty volume here
    # so renewal can land tokens. NEVER protected by HTTPS redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Container healthcheck (HTTP — avoids TLS cert dependency).
    location = /_edge_health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else: 301 to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server: TLS + reverse proxy + static FE.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name crm.allcheckservices.com;

    # ---- TLS ---------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/crm.allcheckservices.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.allcheckservices.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Static FE root ----------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Upload size budget — matches MAX_FILE_SIZE on the backend (50 MB).
    client_max_body_size 50m;

    # ---- HTTPS healthcheck (used by external monitoring) ------------------
    location = /_edge_health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- Reverse proxy: /api → api:3000 -----------------------------------
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # 120s — covers PDF generation + LibreOffice rendition + large uploads.
        # Matches existing axios extendedTimeout used by /api/attachments.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # Disable response buffering for streaming endpoints.
        proxy_buffering off;
    }

    # ---- /uploads passthrough — Node serves -------------------------------
    # Don't try to bypass Node and serve from the volume directly: Node
    # enforces auth + storage abstraction (local → S3 flip is transparent).
    location /uploads/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # ---- WebSocket upgrade: /socket.io → api:3000 -------------------------
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long timeouts for persistent WS connections.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Static asset cache headers ---------------------------------------
    # Vite outputs hashed filenames in /assets/, so they're safely immutable
    # for a year. Index html itself is no-cache so the SPA picks up new
    # asset hashes immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ---- SPA catch-all ----------------------------------------------------
    # React Router uses client-side routes. Serve index.html for any
    # not-found path; the SPA dispatches.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
