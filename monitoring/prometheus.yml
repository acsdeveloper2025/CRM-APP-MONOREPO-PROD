global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # CRM Backend
  - job_name: 'crm-backend'
    static_configs:
      - targets: ['PUBLIC_STATIC_IP:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # CRM Frontend
  - job_name: 'crm-frontend'
    static_configs:
      - targets: ['PUBLIC_STATIC_IP:5173']
    scrape_interval: 30s

  # CRM Mobile
  - job_name: 'crm-mobile'
    static_configs:
      - targets: ['PUBLIC_STATIC_IP:5180']
    scrape_interval: 30s

  # PostgreSQL (if metrics endpoint is available)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['PUBLIC_STATIC_IP:5432']
    scrape_interval: 30s
